type: http
name: Update an existing pet.
url: '{{baseUrl}}/pet'
method: PUT
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "doggie",
      "photoUrls": [
        "string",
        "string"
      ],
      "id": 10,
      "category": {
        "id": 1,
        "name": "Dogs"
      },
      "tags": [
        {
          "id": 5725,
          "name": "string"
        },
        {
          "id": 1455,
          "name": "string"
        }
      ],
      "status": "pending"
    }
auth:
  type: oauth2
  credentials:
    - key: scope
      value: write:pets read:pets
      type: string
    - key: authUrl
      value: https://petstore3.swagger.io/oauth/authorize
      type: string
    - key: grant_type
      value: implicit
      type: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "name": "doggie",
            "photoUrls": [
              "string",
              "string"
            ],
            "id": 10,
            "category": {
              "id": 1,
              "name": "Dogs"
            },
            "tags": [
              {
                "id": 5725,
                "name": "string"
              },
              {
                "id": 1455,
                "name": "string"
              }
            ],
            "status": "pending"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Successful operation
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: text
        content: ''
    name: Invalid ID supplied
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: Pet not found
  - response:
      statusCode: 422
      statusText: Unprocessable Entity (WebDAV) (RFC 4918)
      body:
        type: text
        content: ''
    name: Validation exception
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: Unexpected error
