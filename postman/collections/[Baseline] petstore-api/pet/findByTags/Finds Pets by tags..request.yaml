type: http
name: Finds Pets by tags.
url: '{{baseUrl}}/pet/findByTags?tags=string&tags=string'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: tags
    value: string
    description: Tags to filter by
  - key: tags
    value: string
    description: Tags to filter by
auth:
  type: oauth2
  credentials:
    - key: scope
      value: write:pets read:pets
      type: string
    - key: authUrl
      value: https://petstore3.swagger.io/oauth/authorize
      type: string
    - key: grant_type
      value: implicit
      type: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          [
            {
              "name": "doggie",
              "photoUrls": [
                "string",
                "string"
              ],
              "id": 10,
              "category": {
                "id": 1,
                "name": "Dogs"
              },
              "tags": [
                {
                  "id": 9167,
                  "name": "string"
                },
                {
                  "id": 4001,
                  "name": "string"
                }
              ],
              "status": "pending"
            },
            {
              "name": "doggie",
              "photoUrls": [
                "string",
                "string"
              ],
              "id": 10,
              "category": {
                "id": 1,
                "name": "Dogs"
              },
              "tags": [
                {
                  "id": 9908,
                  "name": "string"
                },
                {
                  "id": 1390,
                  "name": "string"
                }
              ],
              "status": "available"
            }
          ]
      headers:
        - key: Content-Type
          value: application/json
    name: successful operation
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: text
        content: ''
    name: Invalid tag value
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: Unexpected error
