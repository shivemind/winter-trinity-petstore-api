type: http
name: Finds Pets by status.
url: '{{baseUrl}}/pet/findByStatus?status=available'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: status
    value: available
    description: Status values that need to be considered for filter
auth:
  type: oauth2
  credentials:
    - key: scope
      value: write:pets read:pets
      type: string
    - key: authUrl
      value: https://petstore3.swagger.io/oauth/authorize
      type: string
    - key: grant_type
      value: implicit
      type: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          [
            {
              "name": "doggie",
              "photoUrls": [
                "string",
                "string"
              ],
              "id": 10,
              "category": {
                "id": 1,
                "name": "Dogs"
              },
              "tags": [
                {
                  "id": 8457,
                  "name": "string"
                },
                {
                  "id": 7775,
                  "name": "string"
                }
              ],
              "status": "available"
            },
            {
              "name": "doggie",
              "photoUrls": [
                "string",
                "string"
              ],
              "id": 10,
              "category": {
                "id": 1,
                "name": "Dogs"
              },
              "tags": [
                {
                  "id": 82,
                  "name": "string"
                },
                {
                  "id": 7821,
                  "name": "string"
                }
              ],
              "status": "pending"
            }
          ]
      headers:
        - key: Content-Type
          value: application/json
    name: successful operation
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: text
        content: ''
    name: Invalid status value
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: Unexpected error
