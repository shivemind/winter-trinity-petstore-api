type: http
name: Deletes a pet.
url: '{{baseUrl}}/pet/:petId'
method: DELETE
headers:
  - key: api_key
    value: string
pathVariables:
  - key: petId
    value: '9944'
    description: Pet id to delete
auth:
  type: oauth2
  credentials:
    - key: scope
      value: write:pets read:pets
      type: string
    - key: authUrl
      value: https://petstore3.swagger.io/oauth/authorize
      type: string
    - key: grant_type
      value: implicit
      type: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: Pet deleted
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: text
        content: ''
    name: Invalid pet value
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: Unexpected error
