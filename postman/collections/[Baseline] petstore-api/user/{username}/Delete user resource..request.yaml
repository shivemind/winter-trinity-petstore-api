type: http
name: Delete user resource.
url: '{{baseUrl}}/user/:username'
method: DELETE
pathVariables:
  - key: username
    value: string
    description: The name that needs to be deleted
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: User deleted
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: text
        content: ''
    name: Invalid username supplied
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: User not found
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: Unexpected error
