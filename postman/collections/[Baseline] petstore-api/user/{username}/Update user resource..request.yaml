type: http
name: Update user resource.
url: '{{baseUrl}}/user/:username'
method: PUT
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: username
    value: string
    description: name that need to be deleted
body:
  type: json
  content: |-
    {
      "id": 10,
      "username": "theUser",
      "firstName": "John",
      "lastName": "James",
      "email": "john@email.com",
      "password": "12345",
      "phone": "12345",
      "userStatus": 1
    }
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: successful operation
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: text
        content: ''
    name: bad request
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: user not found
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: Unexpected error
