type: http
name: Place an order for a pet.
url: '{{baseUrl}}/store/order'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "id": 10,
      "petId": 198772,
      "quantity": 7,
      "shipDate": "1959-05-19T13:07:03.186Z",
      "status": "approved",
      "complete": false
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": 10,
            "petId": 198772,
            "quantity": 7,
            "shipDate": "1959-05-19T13:07:03.186Z",
            "status": "approved",
            "complete": false
          }
      headers:
        - key: Content-Type
          value: application/json
    name: successful operation
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: text
        content: ''
    name: Invalid input
  - response:
      statusCode: 422
      statusText: Unprocessable Entity (WebDAV) (RFC 4918)
      body:
        type: text
        content: ''
    name: Validation exception
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: Unexpected error
