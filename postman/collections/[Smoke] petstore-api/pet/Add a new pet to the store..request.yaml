type: http
name: Add a new pet to the store.
url: '{{baseUrl}}/pet'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "doggie",
      "photoUrls": [
        "string",
        "string"
      ],
      "id": 10,
      "category": {
        "id": 1,
        "name": "Dogs"
      },
      "tags": [
        {
          "id": 8490,
          "name": "string"
        },
        {
          "id": 1272,
          "name": "string"
        }
      ],
      "status": "sold"
    }
auth:
  type: oauth2
  credentials:
    - key: scope
      value: write:pets read:pets
      type: string
    - key: authUrl
      value: https://petstore3.swagger.io/oauth/authorize
      type: string
    - key: grant_type
      value: implicit
      type: string
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "name": "doggie",
            "photoUrls": [
              "string",
              "string"
            ],
            "id": 10,
            "category": {
              "id": 1,
              "name": "Dogs"
            },
            "tags": [
              {
                "id": 8490,
                "name": "string"
              },
              {
                "id": 1272,
                "name": "string"
              }
            ],
            "status": "sold"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Successful operation
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: text
        content: ''
    name: Invalid input
  - response:
      statusCode: 422
      statusText: Unprocessable Entity (WebDAV) (RFC 4918)
      body:
        type: text
        content: ''
    name: Validation exception
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: Unexpected error
