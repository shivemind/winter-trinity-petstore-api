type: http
name: Finds Pets by tags.
url: '{{baseUrl}}/pet/findByTags?tags=string&tags=string'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: tags
    value: string
    description: Tags to filter by
  - key: tags
    value: string
    description: Tags to filter by
auth:
  type: oauth2
  credentials:
    - key: scope
      value: write:pets read:pets
      type: string
    - key: authUrl
      value: https://petstore3.swagger.io/oauth/authorize
      type: string
    - key: grant_type
      value: implicit
      type: string
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          [
            {
              "name": "doggie",
              "photoUrls": [
                "string",
                "string"
              ],
              "id": 10,
              "category": {
                "id": 1,
                "name": "Dogs"
              },
              "tags": [
                {
                  "id": 8143,
                  "name": "string"
                },
                {
                  "id": 9080,
                  "name": "string"
                }
              ],
              "status": "sold"
            },
            {
              "name": "doggie",
              "photoUrls": [
                "string",
                "string"
              ],
              "id": 10,
              "category": {
                "id": 1,
                "name": "Dogs"
              },
              "tags": [
                {
                  "id": 2674,
                  "name": "string"
                },
                {
                  "id": 396,
                  "name": "string"
                }
              ],
              "status": "available"
            }
          ]
      headers:
        - key: Content-Type
          value: application/json
    name: successful operation
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: text
        content: ''
    name: Invalid tag value
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
