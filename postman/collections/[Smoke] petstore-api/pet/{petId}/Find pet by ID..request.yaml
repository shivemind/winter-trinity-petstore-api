type: http
name: Find pet by ID.
url: '{{baseUrl}}/pet/:petId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: petId
    value: '4808'
    description: ID of pet to return
auth:
  type: apikey
  credentials:
    - key: key
      value: api_key
      type: string
    - key: value
      value: '{{apiKey}}'
      type: string
    - key: in
      value: header
      type: string
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "name": "doggie",
            "photoUrls": [
              "string",
              "string"
            ],
            "id": 10,
            "category": {
              "id": 1,
              "name": "Dogs"
            },
            "tags": [
              {
                "id": 8490,
                "name": "string"
              },
              {
                "id": 1272,
                "name": "string"
              }
            ],
            "status": "sold"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: successful operation
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: text
        content: ''
    name: Invalid ID supplied
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: Pet not found
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: Unexpected error
