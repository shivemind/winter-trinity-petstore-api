type: http
name: Deletes a pet.
url: '{{baseUrl}}/pet/:petId'
method: DELETE
headers:
  - key: api_key
    value: string
pathVariables:
  - key: petId
    value: '8994'
    description: Pet id to delete
auth:
  type: oauth2
  credentials:
    - key: scope
      value: write:pets read:pets
      type: string
    - key: authUrl
      value: https://petstore3.swagger.io/oauth/authorize
      type: string
    - key: grant_type
      value: implicit
      type: string
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: Pet deleted
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: text
        content: ''
    name: Invalid pet value
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: Unexpected error
